<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Cotización por Correo - Sistema Ventel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-pink': '#E10098',
                        'brand-pink-dark': '#c10080',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-pink: #E10098;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-entry {
            opacity: 0;
            animation: slideInUp 0.6s ease-out forwards;
        }
        .nav-sticky {
            position: sticky; top: 0; z-index: 50;
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }
        .form-input:focus, .form-textarea:focus {
            outline: none; border-color: var(--brand-pink);
            box-shadow: 0 0 0 3px rgba(225, 0, 152, 0.2);
        }
        .spinner {
            display: inline-block; width: 1.25em; height: 1.25em;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ui-locked { pointer-events: none; }
        .alert-box {
            transition: all 0.3s ease-in-out;
            transform: translateY(-20px);
            opacity: 0;
        }
        .alert-box.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="h-full text-slate-800">

    <nav id="navbar" class="nav-sticky">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <img src="https://assetspwa.liverpool.com.mx/assets/digital/mailings/img/liv_w.png" alt="Logo Liverpool" class="h-8 bg-brand-pink p-1 rounded-md shadow-sm">
                    <span class="font-bold text-xl text-brand-pink tracking-tight hidden sm:inline">Ventel</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="#" id="backButton" class="flex items-center gap-2 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors px-3 py-2 rounded-md border border-slate-200">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                        <span class="hidden sm:inline">Volver al Dashboard</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8 animate-entry">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Enviar Cotización por Correo</h1>
            <p class="text-slate-600 mt-1">Busca un folio para cargar sus datos, redacta el mensaje y envía la cotización completa al cliente.</p>
        </header>

        <!-- Alerta para notificaciones -->
        <div id="alert-container" class="mb-6"></div>

        <!-- Paso 1: Buscar Cotización -->
        <section class="mb-8 p-6 bg-white rounded-xl shadow-sm border border-slate-200 animate-entry" style="animation-delay: 100ms;">
            <h2 class="text-lg font-bold text-slate-800 mb-4">1. Cargar Datos de Cotización</h2>
            <form id="searchQuoteForm" class="flex flex-col sm:flex-row items-start gap-4">
                <div class="relative flex-grow w-full">
                    <label for="folioInput" class="block text-sm font-medium text-slate-700 mb-1">Buscar por Folio</label>
                    <input type="text" id="folioInput" placeholder="Ej: LVP-240801-0001" class="form-input w-full rounded-md border-slate-300 shadow-sm transition disabled:bg-slate-100">
                </div>
                <div class="w-full sm:w-auto">
                    <label class="block text-sm font-medium text-transparent mb-1 hidden sm:block">Buscar</label>
                    <button type="submit" id="searchQuoteButton" class="w-full inline-flex items-center justify-center gap-2 text-sm font-semibold text-white bg-slate-600 hover:bg-slate-700 transition-all duration-200 px-4 py-2.5 rounded-md shadow-sm disabled:opacity-50">
                        <span class="button-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg></span>
                        <span class="button-text">Cargar Datos</span>
                    </button>
                </div>
            </form>
            <div id="quote-data-status" class="mt-4 text-sm text-slate-600 hidden"></div>
        </section>

        <!-- Paso 2: Redactar y Enviar -->
        <form id="emailForm" class="animate-entry" style="animation-delay: 200ms;">
            <section class="p-6 bg-white rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-800 mb-4">2. Redactar Correo</h2>
                <fieldset id="email-fields" disabled class="space-y-6">
                    <div>
                        <label for="recipient" class="block text-sm font-medium text-slate-700 mb-1">Para:</label>
                        <input type="email" id="recipient" class="form-input w-full rounded-md border-slate-300 shadow-sm transition disabled:bg-slate-100" required>
                    </div>
                    <div>
                        <label for="subject" class="block text-sm font-medium text-slate-700 mb-1">Asunto:</label>
                        <input type="text" id="subject" class="form-input w-full rounded-md border-slate-300 shadow-sm transition disabled:bg-slate-100" required>
                    </div>
                    <div>
                        <label for="body" class="block text-sm font-medium text-slate-700 mb-1">Cuerpo del Mensaje (se enviará antes de la cotización):</label>
                        <textarea id="body" rows="8" class="form-textarea w-full rounded-md border-slate-300 shadow-sm transition disabled:bg-slate-100" required></textarea>
                    </div>
                </fieldset>
                <div class="mt-8 pt-6 border-t border-slate-200 text-right">
                    <button type="submit" id="sendButton" disabled class="inline-flex items-center justify-center gap-2 text-sm font-semibold text-white bg-brand-pink hover:bg-brand-pink-dark transition-all duration-200 px-6 py-3 rounded-md shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="button-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg></span>
                        <span class="button-text">Enviar Correo</span>
                    </button>
                </div>
            </section>
        </form>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- Elementos del DOM ---
        const searchQuoteForm = document.getElementById('searchQuoteForm');
        const folioInput = document.getElementById('folioInput');
        const searchQuoteButton = document.getElementById('searchQuoteButton');
        const quoteDataStatus = document.getElementById('quote-data-status');
        
        const emailForm = document.getElementById('emailForm');
        const emailFields = document.getElementById('email-fields');
        const recipientInput = document.getElementById('recipient');
        const subjectInput = document.getElementById('subject');
        const bodyInput = document.getElementById('body');
        const sendButton = document.getElementById('sendButton');
        const backButton = document.getElementById('backButton');
        const alertContainer = document.getElementById('alert-container');

        let loadedQuoteData = null;

        // --- Funciones de UI ---
        const setButtonLoadingState = (button, isLoading, text = 'Cargando...') => {
            if (!button) return;
            const textEl = button.querySelector('.button-text');
            const iconEl = button.querySelector('.button-icon');
            
            if (isLoading) {
                if (textEl && !button.dataset.originalText) button.dataset.originalText = textEl.textContent;
                if (iconEl && !button.dataset.originalIcon) button.dataset.originalIcon = iconEl.innerHTML;
                
                if (textEl) textEl.textContent = text;
                if (iconEl) iconEl.innerHTML = '<div class="spinner w-5 h-5"></div>';
                button.disabled = true;
            } else {
                if (textEl && button.dataset.originalText) textEl.textContent = button.dataset.originalText;
                if (iconEl && button.dataset.originalIcon) iconEl.innerHTML = button.dataset.originalIcon;
                button.disabled = false;
            }
        };

        const showAlert = (message, type = 'success') => {
            const bgColor = type === 'success' ? 'bg-green-100 border-green-400 text-green-800' : 'bg-red-100 border-red-400 text-red-800';
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-box border p-4 rounded-lg relative ${bgColor}`;
            alertDiv.innerHTML = `<p>${message}</p>`;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
            setTimeout(() => alertDiv.classList.add('show'), 10);
            setTimeout(() => {
                alertDiv.classList.remove('show');
                setTimeout(() => alertDiv.remove(), 300);
            }, 5000);
        };

        const resetForm = () => {
            emailFields.disabled = true;
            sendButton.disabled = true;
            emailForm.reset();
            folioInput.value = '';
            quoteDataStatus.classList.add('hidden');
            loadedQuoteData = null;
        };

        // --- Lógica de Navegación ---
        const navigateToDashboard = () => {
            google.script.run
                .withSuccessHandler(baseUrl => {
                    window.top.location.href = `${baseUrl}?page=dashboard`;
                })
                .getScriptUrl();
        };

        // --- Lógica Principal ---
        const handleSearchQuote = (e) => {
            e.preventDefault();
            const folio = folioInput.value.trim();
            if (!folio) {
                showAlert("Por favor, ingresa un número de folio.", "error");
                return;
            }

            setButtonLoadingState(searchQuoteButton, true, 'Buscando...');
            quoteDataStatus.classList.add('hidden');

            google.script.run
                .withSuccessHandler(response => {
                    setButtonLoadingState(searchQuoteButton, false);
                    if (response.success) {
                        loadedQuoteData = response.data;
                        quoteDataStatus.innerHTML = `
                            <span class="font-bold text-green-700">✓ Datos Cargados:</span> 
                            Cotización para <strong>${loadedQuoteData.clientName}</strong>.
                        `;
                        quoteDataStatus.classList.remove('hidden');
                        
                        recipientInput.value = loadedQuoteData.clientEmail;
                        subjectInput.value = `Cotización de Servicios Ventel - Folio ${loadedQuoteData.folio}`;
                        bodyInput.value = `Estimado(a) ${loadedQuoteData.clientName},\n\nJunto con saludar, y como seguimiento a nuestra conversación, le hago llegar la cotización solicitada con folio ${loadedQuoteData.folio}.\n\nQuedo a sus órdenes para cualquier duda o aclaración.\n\nSaludos cordiales,`;
                        
                        emailFields.disabled = false;
                        sendButton.disabled = false;
                    } else {
                        showAlert(response.message, "error");
                        resetForm();
                    }
                })
                .withFailureHandler(error => {
                    setButtonLoadingState(searchQuoteButton, false);
                    showAlert("Error de comunicación al buscar la cotización.", "error");
                    console.error("Error en getQuoteDetailsForEmail:", error);
                })
                .getQuoteDetailsForEmail(folio);
        };

        const handleSendEmail = (e) => {
            e.preventDefault();
            if (!loadedQuoteData || !emailForm.checkValidity()) {
                showAlert("Por favor, completa todos los campos requeridos.", "error");
                return;
            }

            setButtonLoadingState(sendButton, true, 'Enviando...');
            const emailData = {
                to: recipientInput.value,
                subject: subjectInput.value,
                body: bodyInput.value, // El cuerpo del mensaje escrito por el usuario
                folio: loadedQuoteData.folio
            };

            google.script.run
                .withSuccessHandler(response => {
                    setButtonLoadingState(sendButton, false);
                    if (response.success) {
                        showAlert("Correo enviado exitosamente.", "success");
                        resetForm();
                    } else {
                        showAlert(response.message, "error");
                    }
                })
                .withFailureHandler(error => {
                    setButtonLoadingState(sendButton, false);
                    showAlert("Error de comunicación al enviar el correo.", "error");
                    console.error("Error en sendQuoteByEmail:", error);
                })
                .sendQuoteByEmail(emailData);
        };

        // --- Event Listeners ---
        searchQuoteForm.addEventListener('submit', handleSearchQuote);
        emailForm.addEventListener('submit', handleSendEmail);
        backButton.addEventListener('click', (e) => {
            e.preventDefault();
            navigateToDashboard();
        });
    });
    </script>
</body>
</html>
